services:
  wscribe-frontend-dev:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - wscribe-network

  media-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./examples/output:/usr/share/nginx/html:ro
      - ./nginx-dev:/etc/nginx/conf.d:ro
    restart: unless-stopped
    networks:
      - wscribe-network

networks:
  wscribe-network:
    driver: bridge



